<!-- SciSynthesis — Dark Banner v2 (SS Monogram) -->
<!-- Usage: Social media preview, presentations, email headers -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <style>text { font-family: 'Inter', 'Segoe UI', -apple-system, sans-serif; }</style>
    <radialGradient id="glow1" cx="22%" cy="50%" r="35%">
      <stop offset="0%"   stop-color="#374151" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0D0D0D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="78%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#1F2937" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0D0D0D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" fill="#0D0D0D"/>
  <rect x="0" y="0"   width="600" height="1" fill="#2D3748"/>
  <rect x="0" y="199" width="600" height="1" fill="#1F2937"/>

  <!-- Ambient glows -->
  <ellipse cx="130" cy="100" rx="130" ry="90" fill="url(#glow1)"/>
  <ellipse cx="480" cy="100" rx="160" ry="90" fill="url(#glow2)"/>

  <!-- ═══════════════════════════════════════════════════
       SS MONOGRAM — large, left-aligned
  ═══════════════════════════════════════════════════ -->

  <!-- S1 — primary (white) -->
  <path d="M 68,40 C 84,40 84,100 68,100 C 52,100 52,160 68,160"
        stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- S2 — secondary (gray) -->
  <path d="M 128,40 C 144,40 144,100 128,100 C 112,100 112,160 128,160"
        stroke="#9CA3AF" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Neural bridge -->
  <line x1="68" y1="100" x2="128" y2="100"
        stroke="#374151" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Nodes S1 -->
  <circle cx="68"  cy="40"  r="4"   fill="white"/>
  <circle cx="68"  cy="100" r="3"   fill="#D1D5DB"/>
  <circle cx="68"  cy="160" r="2.5" fill="#6B7280"/>

  <!-- Nodes S2 -->
  <circle cx="128" cy="40"  r="3"   fill="#D1D5DB"/>
  <circle cx="128" cy="100" r="2.5" fill="#6B7280"/>
  <circle cx="128" cy="160" r="2"   fill="#4B5563"/>

  <!-- Vertical separator -->
  <line x1="210" y1="38" x2="210" y2="162" stroke="#1F2937" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════════════
       TYPOGRAPHY
  ═══════════════════════════════════════════════════ -->

  <!-- Brand name -->
  <text x="234" y="108" font-size="50" letter-spacing="-2">
    <tspan font-weight="800" fill="white">Sci</tspan><tspan font-weight="300" fill="#9CA3AF">Synthesis</tspan>
  </text>

  <!-- Tagline -->
  <text x="235" y="132" font-size="11" font-weight="600" fill="#4B5563" letter-spacing="4">
    AI RESEARCH PLATFORM
  </text>

  <!-- Domain pill -->
  <rect x="234" y="148" width="132" height="22" rx="6" fill="#1F2937"/>
  <text x="300" y="163" font-size="9" font-weight="600" fill="#6B7280"
        letter-spacing="1.5" text-anchor="middle">scisynthesis.in</text>
</svg>
